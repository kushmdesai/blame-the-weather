<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Slushy Excuses</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #a8edea, #74b9ff, #fd79a8);
            font-family: 'Nunito', sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            padding: 44px 40px;
            border-radius: 28px;
            max-width: 480px;
            width: 90%;
            text-align: center;
        }

        .slush-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.4rem;
            color: #2d3436;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        p.subtitle {
            color: #636e72;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 28px;
        }

        input {
            width: 100%;
            padding: 13px 18px;
            margin-bottom: 14px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            font-size: 1rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.6);
            color: #2d3436;
            outline: none;
            transition: border 0.2s, background 0.2s;
        }

        input::placeholder {
            color: #b2bec3;
        }

        input:focus {
            border-color: #74b9ff;
            background: rgba(255, 255, 255, 0.85);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00cec9, #6c5ce7);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.05rem;
            font-family: 'Fredoka One', cursive;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        .result {
            margin-top: 24px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.55);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            text-align: left;
        }

        .weather-pill {
            display: inline-block;
            background: linear-gradient(135deg, #00cec9, #6c5ce7);
            color: white;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            padding: 3px 12px;
            border-radius: 50px;
            margin-bottom: 12px;
        }

        .excuse-text {
            color: #2d3436;
            font-size: 0.97rem;
            font-weight: 600;
            line-height: 1.65;
            margin-bottom: 14px;
        }

        .punchline {
            border-top: 1.5px solid rgba(255, 255, 255, 0.6);
            padding-top: 12px;
            color: #6c5ce7;
            font-size: 0.9rem;
            font-style: italic;
            font-weight: 700;
            margin: 0;
        }

        a.back-btn {
            margin-top: 20px;
            display: inline-block;
            padding: 13px 32px;
            background: linear-gradient(135deg, #00cec9, #6c5ce7);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-family: "Fredoka One", cursive;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition:
            opacity 0.2s,
            transform 0.15s;
      }

      a.back-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
      }

      a.back-btn:active {
        transform: scale(0.98);
      }
    </style>
</head>
<body>
    <canvas id="slush" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;"></canvas>

    <div style="position: relative; z-index: 1;">
        <div class="card">
            <h1>Slushy Excuses</h1>
            <p class="subtitle">Blame the weather for your bad day.</p>
            <form action="/roast" method="post">
                <input type="text" name="city" placeholder="Your city">
                <input type="text" name="bad_day" placeholder="What happened?">
                <button type="submit">Get my excuse!</button>
            </form>
            {% if excuse %}
            <div class="result">
                <div class="weather-pill">{{ weather_summary }}</div>
                <p class="excuse-text">{{ excuse }}</p>
                <p class="punchline">{{ punchline }}</p>
            </div>
            {% endif %}
            <a href="/about" class="back-btn">Learn more ></a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('slush');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const chunks = Array.from({length: 60}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 7 + 3,
            dx: (Math.random() - 0.5) * 0.6,
            dy: (Math.random() - 0.5) * 0.6,
            angle: Math.random() * Math.PI,
            opacity: Math.random() * 0.35 + 0.15,
            color: ['#ffffff','#a8edea','#74b9ff','#fd79a8','#00cec9','#6c5ce7'][Math.floor(Math.random()*6)]
        }));

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const c of chunks) {
                ctx.beginPath();
                ctx.ellipse(c.x, c.y, c.r, c.r * 0.55, c.angle, 0, Math.PI * 2);
                ctx.fillStyle = c.color;
                ctx.globalAlpha = c.opacity;
                ctx.fill();
                ctx.globalAlpha = 1;

                c.x += c.dx;
                c.y += c.dy;
                c.angle += 0.01;

                if (c.x < -10) c.x = canvas.width + 10;
                if (c.x > canvas.width + 10) c.x = -10;
                if (c.y < -10) c.y = canvas.height + 10;
                if (c.y > canvas.height + 10) c.y = -10;
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
